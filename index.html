const { useState, useEffect, useRef, useMemo } = React;

const CLIENT_ID = "c7a8b447f9934221825fd322a7b915b5";
const REDIRECT_URI = "https://karmojarv.github.io/cratelog/";
const SCOPES = "user-top-read user-read-recently-played user-library-read playlist-read-private user-read-currently-playing";

// ── PKCE ──────────────────────────────────────────────────────────────────────
function genVerifier() {
  const arr = new Uint8Array(64);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/[^a-zA-Z0-9]/g,"").slice(0,128);
}
async function genChallenge(v) {
  const d = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}
async function doAuth() {
  const v = genVerifier(), c = await genChallenge(v);
  sessionStorage.setItem("pkce_verifier", v);
  const url = "https://accounts.spotify.com/authorize?" + new URLSearchParams({
    client_id:CLIENT_ID, response_type:"code", redirect_uri:REDIRECT_URI,
    scope:SCOPES, code_challenge_method:"S256", code_challenge:c,
  });
  const w=500,h=700,left=Math.round(window.screenX+(window.outerWidth-w)/2),top=Math.round(window.screenY+(window.outerHeight-h)/2);
  window.open(url,"sp","width="+w+",height="+h+",left="+left+",top="+top+",toolbar=no,menubar=no");
}
async function exchangeCode(code) {
  const v = sessionStorage.getItem("pkce_verifier") || (window.opener && (() => { try { return window.opener.sessionStorage.getItem("pkce_verifier"); } catch(e){ return null; } })());
  if (!v) return null;
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body: new URLSearchParams({ client_id:CLIENT_ID, grant_type:"authorization_code", code, redirect_uri:REDIRECT_URI, code_verifier:v }),
  });
  const d = await res.json();
  return d.access_token || null;
}

// ── SPOTIFY API ───────────────────────────────────────────────────────────────
async function sGet(path, token) {
  const r = await fetch("https://api.spotify.com/v1"+path, { headers:{ Authorization:"Bearer "+token } });
  if (r.status===204) return null;
  if (!r.ok) throw new Error(String(r.status));
  return r.json();
}
async function fetchAllRanges(type, token) {
  const [s,m,l] = await Promise.all([
    sGet("/me/top/"+type+"?limit=50&time_range=short_term",token),
    sGet("/me/top/"+type+"?limit=50&time_range=medium_term",token),
    sGet("/me/top/"+type+"?limit=50&time_range=long_term",token),
  ]);
  return { short:(s&&s.items)||[], medium:(m&&m.items)||[], long:(l&&l.items)||[] };
}
async function fetchAudioFeatures(trackIds, token) {
  if (!trackIds.length) return [];
  const batches = [];
  for (let i=0;i<trackIds.length;i+=100) batches.push(trackIds.slice(i,i+100));
  const results = await Promise.all(batches.map(b=>sGet("/audio-features?ids="+b.join(","),token)));
  return results.flatMap(r=>(r&&r.audio_features)||[]).filter(Boolean);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function aggregateGenres(artists) {
  const c={};
  artists.forEach(a=>(a.genres||[]).forEach(g=>{c[g]=(c[g]||0)+1;}));
  return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,30);
}
function newIn(cur,prev) { const s=new Set(prev.map(x=>x.id)); return cur.filter(x=>!s.has(x.id)); }
function inCommon(a,b) { const s=new Set(b.map(x=>x.id)); return a.filter(x=>s.has(x.id)); }
function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }
function obscurityScore(artists) { return Math.round(100 - avg(artists.map(a=>a.popularity||50))); }
function obscurityLabel(score) {
  if (score>=80) return "Deep Underground";
  if (score>=65) return "Mostly Niche";
  if (score>=50) return "Indie Adjacent";
  if (score>=35) return "Mainstream Aware";
  return "Chart Familiar";
}
function genreColor(genre) {
  const hash = genre.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  const palette = ["#2563eb","#16a34a","#9333ea","#dc2626","#d97706","#0891b2","#be185d","#65a30d"];
  return palette[hash % palette.length];
}

function generateAnalysis(data) {
  const longGenres = aggregateGenres(data.artists.long);
  const shortGenres = aggregateGenres(data.artists.short);
  const g = longGenres.map(x=>x[0]).join(" ");
  const topArtists = data.artists.long.slice(0,5).map(a=>a.name);
  const newArtists = newIn(data.artists.short, data.artists.long).slice(0,3).map(a=>a.name);
  const stableArtists = inCommon(data.artists.long.slice(0,10), data.artists.short.slice(0,10)).slice(0,3).map(a=>a.name);
  const genresDrifting = shortGenres.map(x=>x[0]).filter(rg=>!longGenres.map(x=>x[0]).slice(0,8).includes(rg)).slice(0,3);
  const isExp=/experimental|avant|noise|glitch|abstract|post.rock|kraut/.test(g);
  const isElec=/electronic|techno|house|ambient|synthpop|idm|industrial|electro/.test(g);
  const isDark=/goth|dark|doom|drone|black|death|post.punk|cold.wave|darkwave/.test(g);
  const isDance=/dance|disco|funk|afrobeats|techno|house|club/.test(g);
  const isIndie=/indie|alternative|lo.fi|shoegaze|dream.pop/.test(g);
  const isJazz=/jazz|soul|r.b|blues|neo.soul/.test(g);
  const isClassical=/classical|contemporary|minimalism|orchestral/.test(g);
  const isHipHop=/hip.hop|rap|trap|grime/.test(g);
  const isIntl=/latin|afro|french|german|japanese|korean|brazilian|nordic|estonian/.test(g);
  let core="";
  if (isExp&&isElec) core="post-internet electronics and experimental sound design";
  else if (isExp&&isDark) core="avant-garde darkness and experimental texture";
  else if (isElec&&isDark) core="brooding electronic music with industrial undertones";
  else if (isElec&&isDance) core="dance-floor electronics with a curatorial edge";
  else if (isIndie&&isExp) core="experimental indie";
  else if (isJazz&&isElec) core="electronic music rooted in jazz sensibility";
  else if (isClassical&&isElec) core="contemporary classical and electronic sound";
  else if (isIndie) core="indie and alternative music";
  else if (isElec) core="electronic music";
  else if (isHipHop) core="hip-hop";
  else core="a wide-ranging collection built on strong aesthetic instincts";
  const t3=topArtists.slice(0,3).join(", ");
  let identity="Your listening is anchored in "+core+" — a thread running through your long-term relationship with artists like "+t3+". ";
  if (isDark) identity+="There is a consistent pull toward music with weight and atmosphere, where texture matters as much as melody. ";
  if (isExp) identity+="You consistently gravitate toward artists who treat genre as a starting point rather than a destination. ";
  if (isIntl) identity+="Your taste extends well beyond Anglophone scenes. ";
  let evol="";
  if (stableArtists.length>2) evol+=stableArtists.join(", ")+" have remained constants across your listening history. ";
  if (newArtists.length>0&&genresDrifting.length>0) evol+="Recently you have pulled toward "+newArtists.join(", ")+", suggesting a current interest in "+genresDrifting.join(", ")+". Whether this is a phase or a new direction only time will tell.";
  else if (newArtists.length>0) evol+=newArtists.join(", ")+" have entered your recent rotation — newer arrivals that suggest your taste is still actively moving.";
  else evol+="Your recent and all-time charts are closely aligned — a period of deepening rather than expanding.";
  const families=[];
  if (isExp) families.push("experimental/avant-garde");
  if (isElec) families.push("electronic");
  if (isDark) families.push("dark/post-punk");
  if (isIndie) families.push("indie/alternative");
  if (isJazz) families.push("jazz/soul");
  if (isClassical) families.push("contemporary classical");
  if (isHipHop) families.push("hip-hop");
  if (isDance) families.push("dance");
  let genres="Your genre map spans "+(families.length>0?families.join(", "):"diverse")+" territory. ";
  genres+=isExp?"The presence of experimental genres suggests someone who uses music as a lens for thinking about sound itself.":isElec?"Electronic music runs as connective tissue — production and texture as primary creative acts.":"The breadth here reflects range — a listener who moves between modes without losing a sense of self.";
  let pers="You listen with intention. ";
  pers+=isExp?"The density of experimental genres suggests someone for whom music is a serious cultural practice, not background noise. ":"The specificity of your taste suggests someone who actively seeks music out. ";
  pers+=isDark?"There is a preference for music that sits with discomfort rather than resolving it.":isDance?"The dance music thread suggests you understand music as physical and communal, not just cerebral.":"You likely have strong opinions about what makes music worth your time.";
  return [
    {title:"Sound Identity",body:identity.trim()},
    {title:"Evolution",body:evol.trim()},
    {title:"Genre World",body:genres.trim()},
    {title:"What It Says",body:pers.trim()},
  ];
}

function GenreCloud({ genres }) {
  const max = genres[0]?genres[0][1]:1;
  return (
    <div style={{display:"flex",flexWrap:"wrap",gap:"8px 12px",lineHeight:1.5}}>
      {genres.map(([name,count])=>{
        const weight = count/max;
        const size = 12 + weight*10;
        const opacity = 0.5+weight*0.5;
        return (
          <span key={name} style={{fontSize:size,color:C.text,opacity,fontFamily:"'IBM Plex Mono',monospace",cursor:"default",letterSpacing:"0.2px"}}>
            {name}
          </span>
        );
      })}
    </div>
  );
}

function MoodMap({ tracks, features }) {
  const [hovered, setHovered] = useState(null);
  const size=480, pad=44, inner=size-pad*2;
  const fm={};
  features.forEach(f=>{if(f)fm[f.id]=f;});
  const pts=tracks.slice(0,50).map(t=>{
    const f=fm[t.id]; if(!f) return null;
    return{x:pad+f.energy*inner, y:pad+(1-f.valence)*inner, name:t.name, artist:t.artists&&t.artists[0]&&t.artists[0].name, e:f.energy, v:f.valence};
  }).filter(Boolean);
  return (
    <div style={{position:"relative",display:"inline-block"}}>
      <svg width={size} height={size} style={{display:"block",maxWidth:"100%",background:C.bgCard,border:"1px solid "+C.border}}>
        <line x1={pad} y1={size/2} x2={size-pad} y2={size/2} stroke={C.border} strokeWidth="1"/>
        <line x1={size/2} y1={pad} x2={size/2} y2={size-pad} stroke={C.border} strokeWidth="1"/>
        {[[pad+4,pad+14,"TURBULENT"],[size-pad-4,pad+14,"EUPHORIC","end"],[pad+4,size-pad-4,"BROODING"],[size-pad-4,size-pad-4,"SERENE","end"]].map(([x,y,label,anchor])=>(
          <text key={label} x={x} y={y} textAnchor={anchor||"start"} style={{fontSize:10,fill:C.textLight,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:1}}>{label}</text>
        ))}
        <text x={size/2} y={size-6} textAnchor="middle" style={{fontSize:10,fill:C.textLight,fontFamily:"'IBM Plex Mono',monospace"}}>← CALM · ENERGY · INTENSE →</text>
        <text x={10} y={size/2} textAnchor="middle" transform={"rotate(-90,10,"+size/2+")"} style={{fontSize:10,fill:C.textLight,fontFamily:"'IBM Plex Mono',monospace"}}>← DARK · MOOD · BRIGHT →</text>
        {pts.map((p,i)=>(
          <circle key={i} cx={p.x} cy={p.y} r={hovered===i?7:4}
            fill={hovered===i?"#1a1a1a":"transparent"}
            stroke="#1a1a1a"
            strokeWidth={hovered===i?1.5:1}
            style={{cursor:"pointer",transition:"r 0.1s"}}
            onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)}/>
        ))}
      </svg>
      {hovered!==null&&pts[hovered]&&(
        <div style={{position:"absolute",top:Math.max(4,pts[hovered].y-52),left:Math.min(pts[hovered].x+12,size-170),background:C.bgCard,border:"1px solid "+C.borderDark,padding:"8px 12px",pointerEvents:"none",zIndex:10,minWidth:160}}>
          <div style={{fontSize:13,color:C.text,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:155}}>{pts[hovered].name}</div>
          <div style={{fontSize:11,color:C.textMid,marginTop:2,fontFamily:"'IBM Plex Mono',monospace"}}>{pts[hovered].artist}</div>
          <div style={{fontSize:10,color:C.textLight,marginTop:4,fontFamily:"'IBM Plex Mono',monospace"}}>E:{Math.round(pts[hovered].e*100)} V:{Math.round(pts[hovered].v*100)}</div>
        </div>
      )}
    </div>
  );
}

function RadarChart({ data }) {
  const size=240,cx=120,cy=120,r=82;
  const keys=Object.keys(data),n=keys.length;
  const pts=keys.map((k,i)=>{
    const a=(i/n)*Math.PI*2-Math.PI/2,val=data[k]/10;
    return{x:cx+r*val*Math.cos(a),y:cy+r*val*Math.sin(a),lx:cx+(r+32)*Math.cos(a),ly:cy+(r+32)*Math.sin(a),label:k};
  });
  return (
    <svg width={size} height={size} style={{overflow:"visible"}}>
      {[0.25,0.5,0.75,1].map(lvl=>(
        <polygon key={lvl} points={keys.map((_,i)=>{const a=(i/n)*Math.PI*2-Math.PI/2;return(cx+r*lvl*Math.cos(a))+","+(cy+r*lvl*Math.sin(a));}).join(" ")} fill="none" stroke={C.border} strokeWidth="1"/>
      ))}
      {keys.map((_,i)=>{const a=(i/n)*Math.PI*2-Math.PI/2;return<line key={i} x1={cx} y1={cy} x2={cx+r*Math.cos(a)} y2={cy+r*Math.sin(a)} stroke={C.border} strokeWidth="1"/>;  })}
      <polygon points={pts.map(p=>p.x+","+p.y).join(" ")} fill="rgba(26,26,26,0.08)" stroke="#1a1a1a" strokeWidth="1.5"/>
      {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="3.5" fill="#1a1a1a"/>)}
      {pts.map((p,i)=><text key={i} x={p.lx} y={p.ly} textAnchor="middle" dominantBaseline="middle" style={{fontSize:9,fill:C.textLight,fontFamily:"'IBM Plex Mono',monospace",textTransform:"uppercase",letterSpacing:1}}>{p.label}</text>)}
    </svg>
  );
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
function App() {
  const [token, setToken] = useState(null);
  const [phase, setPhase] = useState("init");
  const [error, setError] = useState(null);
  const [profile, setProfile] = useState(null);
  const [data, setData] = useState(null);
  const [audioFeatures, setAudioFeatures] = useState([]);
  const [activeTab, setActiveTab] = useState("overview");
  const [timeRange, setTimeRange] = useState("long");
  const pollRef = useRef(null);

  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const code=params.get("code");
    if(code){
      window.history.replaceState({},"",window.location.pathname);
      setPhase("loading");
      exchangeCode(code).then(t=>{
        if(t){
          sessionStorage.setItem("sp_token",t);
          if(window.opener){try{window.opener.sessionStorage.setItem("sp_token",t);}catch(e){} window.close();}
          else{setToken(t);}
        } else {setError("Token exchange failed.");setPhase("error");}
      });
      return;
    }
    const stored=sessionStorage.getItem("sp_token");
    if(stored){setToken(stored);setPhase("ready");}
    else setPhase("login");
  },[]);

  function startPolling(){
    if(pollRef.current) clearInterval(pollRef.current);
    pollRef.current=setInterval(()=>{
      const t=sessionStorage.getItem("sp_token");
      if(t){clearInterval(pollRef.current);setToken(t);setPhase("ready");}
    },600);
  }

  useEffect(()=>{
    if(!token||data) return;
    setPhase("loading");
    Promise.all([
      sGet("/me",token),
      fetchAllRanges("artists",token),
      fetchAllRanges("tracks",token),
    ]).then(async([prof,artists,tracks])=>{
      setProfile(prof);
      let features=[];
      try{features=await fetchAudioFeatures((tracks.long||[]).map(t=>t.id),token);}catch(e){}
      setAudioFeatures(features);
      setData({artists,tracks});
      setPhase("ready");
    }).catch(e=>{
      if(e.message==="401"){sessionStorage.removeItem("sp_token");setToken(null);setPhase("login");}
      else{setError("Failed to load: "+e.message);setPhase("error");}
    });
  },[token]);

  function logout(){sessionStorage.removeItem("sp_token");setToken(null);setData(null);setProfile(null);setPhase("login");}
  async function handleConnect(){await doAuth();startPolling();}

  if(phase==="init"||phase==="loading") return <Loader msg={phase==="init"?"initialising":"loading your data"}/>;
  if(phase==="error") return <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}><p style={{color:"#c00"}}>{error}</p><button style={btnS} onClick={()=>setPhase("login")}>Retry</button></div>;

  if(phase==="login") return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{textAlign:"center",animation:"fadeUp 0.4s ease",maxWidth:400,border:"1px solid "+C.borderDark,padding:"48px 40px",background:C.bgCard}}>
        <div style={{fontSize:11,letterSpacing:"3px",textTransform:"uppercase",fontFamily:"'IBM Plex Mono',monospace",color:C.textLight,marginBottom:20}}>cratelog</div>
        <h1 style={{fontSize:32,fontWeight:600,color:C.text,margin:"0 0 14px",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:"-1px"}}>Your Music,<br/>Mapped.</h1>
        <p style={{color:C.textMid,fontSize:14,lineHeight:1.7,marginBottom:32}}>Top artists, genre archaeology,<br/>mood analysis, taste evolution.</p>
        <button style={btnS} onClick={handleConnect}>Connect Spotify</button>
        <p style={{color:C.textLight,fontSize:11,marginTop:14,fontFamily:"'IBM Plex Mono',monospace"}}>opens a popup window</p>
      </div>
    </div>
  );

  if(!data) return <Loader msg="loading"/>;

  const artists = data.artists[timeRange];
  const tracks = data.tracks[timeRange];
  const longGenres = aggregateGenres(data.artists.long);
  const shortGenres = aggregateGenres(data.artists.short);
  const newArtists = newIn(data.artists.short, data.artists.long);
  const fadedArtists = newIn(data.artists.long.slice(0,20), data.artists.short);
  const stableArtists = inCommon(data.artists.long.slice(0,20), data.artists.short.slice(0,20));
  const identitySections = generateAnalysis(data);
  const obsScore = obscurityScore(data.artists.long);
  const obsLabel = obscurityLabel(obsScore);

  const fm={};
  audioFeatures.forEach(f=>{if(f)fm[f.id]=f;});
  const fv=data.tracks.long.slice(0,50).map(t=>fm[t.id]).filter(Boolean);
  const af={
    energy:avg(fv.map(f=>f.energy)),
    valence:avg(fv.map(f=>f.valence)),
    danceability:avg(fv.map(f=>f.danceability)),
    acousticness:avg(fv.map(f=>f.acousticness)),
    instrumentalness:avg(fv.map(f=>f.instrumentalness)),
    speechiness:avg(fv.map(f=>f.speechiness)),
  };
  const avgTempo=avg(fv.map(f=>f.tempo));
  const vibes={
    "Energy":Math.round((af.energy||0.5)*10),
    "Mood":Math.round((af.valence||0.4)*10),
    "Dance":Math.round((af.danceability||0.4)*10),
    "Acoustic":Math.round((af.acousticness||0.3)*10),
    "Instrum":Math.round((af.instrumentalness||0.3)*10),
  };

  const tabs=[
    {id:"overview",label:"Overview"},
    {id:"artists",label:"Artists"},
    {id:"tracks",label:"Tracks"},
    {id:"genres",label:"Genres"},
    {id:"mood",label:"Mood Map"},
    {id:"audio",label:"Audio DNA"},
    {id:"evolution",label:"Evolution"},
  ];
  const trLabels={"short":"4 Weeks","medium":"6 Months","long":"All Time"};

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>

      {/* Header */}
      <div style={{background:C.bgCard,borderBottom:"2px solid "+C.borderDark,padding:"0 32px",display:"flex",alignItems:"center",justifyContent:"space-between",height:50,position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:20}}>
          <span style={{fontSize:13,color:C.text,fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,letterSpacing:"1px"}}>CRATELOG</span>
          <span style={{color:C.border}}>|</span>
          <span style={{fontSize:12,color:C.textMid,fontFamily:"'IBM Plex Mono',monospace"}}>{profile&&profile.display_name}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:11,color:C.textLight,fontFamily:"'IBM Plex Mono',monospace"}}>range:</span>
          {Object.entries(trLabels).map(([v,l])=>(
            <button key={v} onClick={()=>setTimeRange(v)} className="tab-hover"
              style={{background:"none",border:timeRange===v?"1px solid "+C.borderDark:"1px solid transparent",color:timeRange===v?C.text:C.textLight,padding:"3px 10px",fontSize:11,cursor:"pointer",fontFamily:"'IBM Plex Mono',monospace",borderRadius:2,transition:"all 0.1s"}}>
              {l}
            </button>
          ))}
          <span style={{color:C.border}}>|</span>
          <button onClick={logout} className="tab-hover" style={{background:"none",border:"none",color:C.textLight,fontSize:11,cursor:"pointer",fontFamily:"'IBM Plex Mono',monospace"}}>disconnect</button>
        </div>
      </div>

      {/* Tab bar */}
      <div style={{background:C.bgCard,borderBottom:"1px solid "+C.border,padding:"0 32px",display:"flex",gap:0}}>
        {tabs.map(t=>(
          <button key={t.id} className="tab-hover" onClick={()=>setActiveTab(t.id)}
            style={{background:"none",border:"none",borderBottom:activeTab===t.id?"2px solid "+C.text:"2px solid transparent",color:activeTab===t.id?C.text:C.textLight,padding:"10px 16px",fontSize:12,cursor:"pointer",letterSpacing:"1px",textTransform:"uppercase",fontFamily:"'IBM Plex Mono',monospace",marginBottom:-1,transition:"color 0.1s"}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{padding:"28px 32px 64px",maxWidth:1320,margin:"0 auto"}}>

        {/* OVERVIEW */}
        {activeTab==="overview" && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              {/* Stats row */}
              <Panel>
                <SLabel>Stats · {trLabels[timeRange]}</SLabel>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,fontFamily:"'IBM Plex Mono',monospace"}}>
                  <tbody>
                    {[
                      ["Obscurity Score",obsScore+"% — "+obsLabel],
                      ["Top Artist",artists[0]&&artists[0].name],
                      ["Avg Popularity",Math.round(avg(data.artists.long.map(a=>a.popularity||50)))+"/100"],
                      ["Unique Genres",longGenres.length],
                      ["New This Period",newArtists.length+" artists"],
                      ...(avgTempo?[["Avg BPM",Math.round(avgTempo)]]:[] ),
                      ...(af.energy?[["Avg Energy",Math.round(af.energy*100)+"%"]]:[] ),
                    ].map(([k,v])=>(
                      <tr key={k} style={{borderBottom:"1px solid "+C.border}}>
                        <td style={{padding:"7px 0",color:C.textMid,width:"45%"}}>{k}</td>
                        <td style={{padding:"7px 0",color:C.text,fontWeight:500}}>{v}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </Panel>
              <Panel>
                <SLabel>Genre Universe</SLabel>
                <GenreCloud genres={longGenres.slice(0,20)}/>
              </Panel>
              <Panel>
                <SLabel>Personality Radar</SLabel>
                <div style={{display:"flex",justifyContent:"center",padding:"8px 0"}}>
                  <RadarChart data={vibes}/>
                </div>
              </Panel>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              <Panel>
                <SLabel>Sound Portrait</SLabel>
                {identitySections.map((s,i)=>(
                  <div key={i} style={{marginBottom:22}}>
                    <div style={{fontSize:10,letterSpacing:"2px",textTransform:"uppercase",color:C.textLight,marginBottom:7,fontFamily:"'IBM Plex Mono',monospace"}}>{s.title}</div>
                    <p style={{color:C.textMid,fontSize:14,lineHeight:1.85,margin:0}}>{s.body}</p>
                  </div>
                ))}
              </Panel>
              <Panel>
                <SLabel>Top Artists · {trLabels[timeRange]}</SLabel>
                {artists.slice(0,8).map((a,i)=><ArtistRow key={a.id} artist={a} rank={i+1}/>)}
              </Panel>
            </div>
          </div>
        )}

        {/* ARTISTS */}
        {activeTab==="artists" && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <Panel>
              <SLabel>Top 25 Artists · {trLabels[timeRange]}</SLabel>
              {artists.slice(0,25).map((a,i)=><ArtistRow key={a.id} artist={a} rank={i+1}/>)}
            </Panel>
            <Panel>
              <SLabel>Top 25–50 Artists</SLabel>
              {artists.slice(25,50).map((a,i)=><ArtistRow key={a.id} artist={a} rank={i+26}/>)}
            </Panel>
          </div>
        )}

        {/* TRACKS */}
        {activeTab==="tracks" && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <Panel>
              <SLabel>Top 25 Tracks · {trLabels[timeRange]}</SLabel>
              {tracks.slice(0,25).map((t,i)=><TrackRow key={t.id+i} track={t} rank={i+1}/>)}
            </Panel>
            <Panel>
              <SLabel>Top 25–50 Tracks</SLabel>
              {tracks.slice(25,50).map((t,i)=><TrackRow key={t.id+i} track={t} rank={i+26}/>)}
            </Panel>
          </div>
        )}

        {/* GENRES */}
        {activeTab==="genres" && (
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:20}}>
            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              <Panel>
                <SLabel>All Genres — Cloud View</SLabel>
                <GenreCloud genres={longGenres}/>
              </Panel>
              <Panel>
                <SLabel>Genre Frequency — All Time</SLabel>
                {longGenres.map(([name,count],i)=>{
                  const max=longGenres[0][1];
                  return (
                    <div key={name} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                      <span style={{width:20,fontSize:11,color:C.textLight,textAlign:"right",fontFamily:"'IBM Plex Mono',monospace",flexShrink:0}}>{i+1}</span>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                          <span style={{fontSize:13,color:C.text}}>{name}</span>
                          <span style={{fontSize:11,color:C.textLight,fontFamily:"'IBM Plex Mono',monospace"}}>{count}</span>
                        </div>
                        <div style={{height:2,background:C.border,borderRadius:1}}>
                          <div style={{height:"100%",width:((count/max)*100)+"%",background:C.text,borderRadius:1}}/>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </Panel>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              <Panel>
                <SLabel>Obscurity Score</SLabel>
                <div style={{textAlign:"center",padding:"24px 0 20px"}}>
                  <div style={{fontSize:64,fontWeight:600,color:C.text,fontFamily:"'IBM Plex Mono',monospace",lineHeight:1}}>{obsScore}</div>
                  <div style={{fontSize:13,color:C.textMid,marginTop:8,fontFamily:"'IBM Plex Mono',monospace"}}>{obsLabel}</div>
                  <div style={{fontSize:11,color:C.textLight,marginTop:12,lineHeight:1.6,fontFamily:"'IBM Plex Mono',monospace"}}>avg artist popularity:<br/>{Math.round(avg(data.artists.long.map(a=>a.popularity||50)))}/100</div>
                </div>
                <Divider/>
                {[["Deep Underground","80+"],["Mostly Niche","65–79"],["Indie Adjacent","50–64"],["Mainstream Aware","35–49"],["Chart Familiar","0–34"]].map(([label,range])=>(
                  <div key={label} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid "+C.border,background:obsLabel===label?"#d8d6d0":"transparent",margin:"0 -6px",paddingLeft:6,paddingRight:6}}>
                    <span style={{fontSize:12,color:obsLabel===label?C.text:C.textLight,fontWeight:obsLabel===label?600:400,fontFamily:"'IBM Plex Mono',monospace"}}>{obsLabel===label?"▶ ":""}{label}</span>
                    <span style={{fontSize:11,color:C.textLight,fontFamily:"'IBM Plex Mono',monospace"}}>{range}</span>
                  </div>
                ))}
              </Panel>
              <Panel>
                <SLabel>Recent Genre Shift</SLabel>
                <div style={{fontSize:10,color:C.textLight,marginBottom:10,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:1}}>RECENT (4 WKS)</div>
                <GenreCloud genres={shortGenres.slice(0,14)}/>
                <Divider/>
                <div style={{fontSize:10,color:C.textLight,marginBottom:10,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:1}}>ALL TIME</div>
                <GenreCloud genres={longGenres.slice(0,14)}/>
              </Panel>
            </div>
          </div>
        )}

        {/* MOOD MAP */}
        {activeTab==="mood" && (
          <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:20,alignItems:"start"}}>
            <Panel style={{display:"inline-block"}}>
              <SLabel>Mood Map · Top 50 Tracks</SLabel>
              <div style={{fontSize:11,color:C.textLight,marginBottom:14,fontFamily:"'IBM Plex Mono',monospace"}}>hover each point to identify track</div>
              {audioFeatures.length>0
                ?<MoodMap tracks={data.tracks.long} features={audioFeatures}/>
                :<div style={{padding:"40px 20px",textAlign:"center",color:C.textLight,fontFamily:"'IBM Plex Mono',monospace",fontSize:12}}>audio features unavailable</div>
              }
            </Panel>
            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              <Panel>
                <SLabel>Quadrant Breakdown</SLabel>
                {audioFeatures.length>0&&(()=>{
                  const q={EUPHORIC:0,TURBULENT:0,SERENE:0,BROODING:0};
                  data.tracks.long.slice(0,50).forEach(t=>{
                    const f=fm[t.id]; if(!f) return;
                    if(f.energy>0.5&&f.valence>0.5) q.EUPHORIC++;
                    else if(f.energy>0.5&&f.valence<0.5) q.TURBULENT++;
                    else if(f.energy<0.5&&f.valence>0.5) q.SERENE++;
                    else q.BROODING++;
                  });
                  const total=Object.values(q).reduce((a,b)=>a+b,0)||1;
                  return Object.entries(q).sort((a,b)=>b[1]-a[1]).map(([k,v])=>(
                    <div key={k} style={{marginBottom:12}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <span style={{fontSize:12,color:C.text,fontFamily:"'IBM Plex Mono',monospace"}}>{k}</span>
                        <span style={{fontSize:12,color:C.textLight,fontFamily:"'IBM Plex Mono',monospace"}}>{v} tracks · {Math.round((v/total)*100)}%</span>
                      </div>
                      <div style={{height:3,background:C.border,borderRadius:1}}>
                        <div style={{height:"100%",width:((v/total)*100)+"%",background:C.text,borderRadius:1}}/>
                      </div>
                    </div>
                  ));
                })()}
              </Panel>
              <Panel>
                <SLabel>Mood Summary</SLabel>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,fontFamily:"'IBM Plex Mono',monospace"}}>
                  <tbody>
                    {af.energy&&[
                      ["Avg Energy",Math.round(af.energy*100)+"%"],
                      ["Avg Positivity",Math.round(af.valence*100)+"%"],
                      ["Avg Danceability",Math.round(af.danceability*100)+"%"],
                      ["Avg BPM",avgTempo?Math.round(avgTempo):"—"],
                      ["Mood Tone",af.valence>0.5?"Positive / Bright":"Dark / Introspective"],
                    ].map(([k,v])=>(
                      <tr key={k} style={{borderBottom:"1px solid "+C.border}}>
                        <td style={{padding:"7px 0",color:C.textMid}}>{k}</td>
                        <td style={{padding:"7px 0",color:C.text,fontWeight:500,textAlign:"right"}}>{v}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </Panel>
            </div>
          </div>
        )}

        {/* AUDIO DNA */}
        {activeTab==="audio" && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <Panel>
              <SLabel>Audio Features · All-Time Top 50</SLabel>
              {af.energy>0?(
                <div>
                  <FeatureBar label="Energy" value={af.energy}/>
                  <FeatureBar label="Valence (Positivity)" value={af.valence}/>
                  <FeatureBar label="Danceability" value={af.danceability}/>
                  <FeatureBar label="Acousticness" value={af.acousticness}/>
                  <FeatureBar label="Instrumentalness" value={af.instrumentalness}/>
                  <FeatureBar label="Speechiness" value={af.speechiness}/>
                  <Divider/>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,fontFamily:"'IBM Plex Mono',monospace"}}>
                    <tbody>
                      {[["Avg BPM",Math.round(avgTempo)||"—"],["Dominant Mood",af.valence>0.5?"Positive":"Dark"],["Energy Level",af.energy>0.6?"High":af.energy>0.4?"Medium":"Low"]].map(([k,v])=>(
                        <tr key={k} style={{borderBottom:"1px solid "+C.border}}>
                          <td style={{padding:"7px 0",color:C.textMid}}>{k}</td>
                          <td style={{padding:"7px 0",color:C.text,fontWeight:500,textAlign:"right"}}>{v}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              ):<div style={{padding:"32px 0",textAlign:"center",color:C.textLight,fontFamily:"'IBM Plex Mono',monospace",fontSize:12}}>audio features unavailable</div>}
            </Panel>
            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              <Panel>
                <SLabel>Personality Radar</SLabel>
                <div style={{display:"flex",justifyContent:"center",padding:"8px 0"}}>
                  <RadarChart data={vibes}/>
                </div>
              </Panel>
              <Panel>
                <SLabel>Interpretation</SLabel>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {[
                    af.instrumentalness>0.4&&"High instrumentalness — you lean toward music where sound does the talking, not lyrics.",
                    af.acousticness>0.4&&"Significant acousticness — organic instrumentation holds real weight in your rotation.",
                    af.energy>0.65&&"High energy — your music moves, even when it's experimental.",
                    af.energy<0.4&&"Low average energy — restrained, textured, or atmospheric sound.",
                    af.danceability>0.65&&"Strong danceability — rhythm and groove are central to your taste.",
                    af.valence<0.35&&"Low valence — emotionally, your music skews dark and introspective.",
                    af.valence>0.65&&"High valence — your taste tends toward the euphoric.",
                    avgTempo>130&&"Fast average BPM — you're drawn to music that moves at pace.",
                    avgTempo<90&&"Slow average BPM — patience and space matter in what you listen to.",
                  ].filter(Boolean).map((txt,i)=>(
                    <div key={i} style={{fontSize:13,color:C.textMid,lineHeight:1.7,paddingLeft:12,borderLeft:"2px solid "+C.borderDark}}>
                      {txt}
                    </div>
                  ))}
                </div>
              </Panel>
            </div>
          </div>
        )}

        {/* EVOLUTION */}
        {activeTab==="evolution" && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              {newArtists.length>0&&(
                <Panel>
                  <SLabel>Newly Emerged · Last 4 Weeks</SLabel>
                  <p style={{fontSize:12,color:C.textLight,marginBottom:14,fontFamily:"'IBM Plex Mono',monospace"}}>artists new to your rotation</p>
                  {newArtists.slice(0,12).map((a,i)=><ArtistRow key={a.id} artist={a} rank={i+1} isNew={true}/>)}
                </Panel>
              )}
              {fadedArtists.length>0&&(
                <Panel>
                  <SLabel>Fading From Rotation</SLabel>
                  {fadedArtists.slice(0,10).map((a,i)=><ArtistRow key={a.id} artist={a} rank={i+1} isGone={true}/>)}
                </Panel>
              )}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              <Panel>
                <SLabel>Long-Term Constants</SLabel>
                <p style={{fontSize:12,color:C.textLight,marginBottom:14,fontFamily:"'IBM Plex Mono',monospace"}}>{stableArtists.length} artists in both all-time and recent top 20</p>
                {stableArtists.slice(0,12).map((a,i)=><ArtistRow key={a.id} artist={a} rank={i+1}/>)}
              </Panel>
              <Panel>
                <SLabel>Genre Shift — All Time vs Recent</SLabel>
                <div style={{fontSize:10,color:C.textLight,marginBottom:10,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:1}}>ALL TIME</div>
                <GenreCloud genres={longGenres.slice(0,12)}/>
                <Divider/>
                <div style={{fontSize:10,color:C.textLight,marginBottom:10,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:1}}>RECENT (4 WKS)</div>
                <GenreCloud genres={shortGenres.slice(0,12)}/>
              </Panel>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

const btnS={background:"#1a1a1a",color:"#f2f0eb",border:"none",padding:"12px 36px",fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:"1px"};

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
